<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Case of the Missing Vermeer Painting</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    
</head>
<body>
    <div class="images-container">
    <img src="assets/mainBgPic.jpg" class="mainBg" alt="Evidence Board">
    <a href="elena.html">
    <img src="assets/elenaPic.png" class="overlay-images" alt="Elena's Photo">
</a>
    <a href="scarlet.html">
    <img src="assets/scarletPic.png" class="overlay-images" alt="Scarlet's Photo">
</a>
    <a href="victor.html">
    <img src="assets/victorPic.png" class="overlay-images" alt="Victor's Photo">
</a>
    <img src="assets/newsPaperPic.png" class="overlay-images" data-popup data-popup-src="assets/newsPaperPopup.png" alt="Newspaper Article">
    <a href="vermeerfile.html">
    <img src="assets/vermeerCasePic.png" class="overlay-images" alt="Case File">
</a>
    <img src="assets/bluePrintPic.png" class="overlay-images" data-popup data-popup-src="assets/bluePrintPopup.png" alt="Blueprint of Gallery">
    <img src="assets/victorsReviewPic.png" class="overlay-images" data-popup data-popup-src="assets/reviewPopup.png" alt="Victor's Written Review">
    <img src="assets/string.png" class="overlay-images">
    </div>

    <div id="modal" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close">&times;</button>
            <img id="modal-img" src="" alt="">
        </div>
    </div>

    <button id="solve-case-btn">Think you solved the case?</button>

    <div id="solve-modal">

        <div id="solve-modal-inner">

            <div id="solve-question">
                <p class="solve-eyebrow">Case File #4471</p>
                <h2 id="solve-title">Who stole the Vermeer?</h2>
                <p id="solve-subtitle">Choose your suspect carefully.</p>
                <div id="suspect-btns">
                    <button class="suspect-choice" data-suspect="elena">Elena<span>Rival Gallery Owner</span></button>
                    <button class="suspect-choice" data-suspect="scarlet">Scarlet<span>Head of Security</span></button>
                    <button class="suspect-choice" data-suspect="victor">Victor<span>Disgraced Art Critic</span></button>
                </div>
            </div>

            <div id="solve-result" class="hidden">
                <p id="result-label"></p>
                <h2 id="result-title"></h2>
                <p id="result-body"></p>
                <button id="result-close">Close</button>

                  <div id="new-evidence" class="hidden">
    <p class="solve-eyebrow">Update</p>
    <h2>Wait... New Evidence Just Dropped</h2>

    <img src="assets/newEvidence.png" 
         alt="New Evidence"
         style="width:80%; max-width:600px; border-radius:10px; margin:20px 0;">

   

    <div class="rethink-btn-wrap" style="display:flex; justify-content:center; margin-top:20px;">
        <button id="rethink-btn" class="suspect-choice">
            Reconsider Your Answer
        </button>
    </div>
</div>
            </div>

        </div>
    </div>

    <div id="intro-overlay">

        <div id="intro-screen">
            <p class="intro-eyebrow">Classified &mdash; Case File #4471</p>
            <h1 class="intro-title">The Vermeer Variation</h1>
            <p class="intro-desc">
                An $80 million painting. A stolen canvas.<br>
                One night. Three suspects. Zero answers.
            </p>
            <button id="watch-btn">&#9654;&nbsp; Watch Security Footage</button>
        </div>

        <div id="video-screen">
            <div class="footage-header">
                <span class="rec-dot"></span> REC &nbsp;&nbsp; SECURITY CAM &mdash; STUDY ENTRANCE
            </div>
            <video id="crime-video" src="assets/Thief.mov" playsinline controls></video>
            <div id="after-video-msg">
                <button id="solve-btn">Do you have what it takes to solve the case?</button>
            </div>
        </div>

    </div>

</body>
</html>
